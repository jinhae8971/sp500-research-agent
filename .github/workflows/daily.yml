name: Daily S&P 500 Research

on:
  schedule:
    # After US market close: 22:00 UTC (≈ 17:00 ET / 07:00 KST+1)
    # Weekdays only: Sun-Thu UTC = Mon-Fri ET
    - cron: '0 22 * * 0-4'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-research
  cancel-in-progress: false

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run daily pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
        run: python -m src.main

      - name: Commit reports & snapshots
        run: |
          git config user.name  "sp500-research-bot"
          git config user.email "sp500-research-bot@users.noreply.github.com"
          git add docs/reports data/snapshots
          if git diff --staged --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore: daily report $(date -u +%F)"
            push_ok=false
            for i in 1 2 3 4; do
              if git push; then
                echo "push succeeded"
                push_ok=true
                break
              fi
              sleep $((2 ** i))
            done
            if [ "$push_ok" = false ]; then
              echo "::error::git push failed after 4 retries"
              exit 1
            fi
          fi

      - name: Notify failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="⚠️ S&P 500 Research Agent pipeline failed on $(date -u +%F)%0ACheck: https://github.com/jinhae8971/sp500-research-agent/actions"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MSG}" \
            -d parse_mode="HTML" || true

  deploy-pages:
    needs: research
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs
      - id: deployment
        uses: actions/deploy-pages@v4
