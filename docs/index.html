<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>S&P 500 Research Agent</title>
<link rel="stylesheet" href="assets/style.css" />
</head>
<body>
<header class="hero">
  <h1>🇺🇸 S&P 500 Research Agent</h1>
  <p class="tagline" id="hero-tagline">Loading latest narrative…</p>
</header>

<main>
  <section class="card" id="narrative-card" hidden>
    <h2>📊 Today's Narrative</h2>
    <p id="narrative-text"></p>
    <div class="sector-row">
      <div>🔥 <strong>Hot:</strong> <span id="hot-sectors"></span></div>
      <div>❄️ <strong>Cooling:</strong> <span id="cooling-sectors"></span></div>
    </div>
    <p class="insight" id="insight-text"></p>
  </section>

  <section class="card" id="top5-card" hidden>
    <h2>🏆 2-Day Top Gainers</h2>
    <div id="top5-grid" class="grid"></div>
  </section>

  <section class="card">
    <h2>📚 Past Reports</h2>
    <ul id="history-list" class="history"></ul>
  </section>
</main>

<footer>
  <p>Generated by sp500-research-agent · updated daily after US market close</p>
</footer>

<script src="assets/app.js"></script>
</body>
</html>
